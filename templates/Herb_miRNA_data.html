<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herb miRNA Data</title>
    <style>

        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            margin: 0 auto;
            max-width: 1200px;
        }

        header {
            background-color: #4A7A4A;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        .table-box {
            background-color: white;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #ddd;
        }

        .filter-select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .table-container {
            max-height: 600px;
            overflow-y: auto;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #e9f3e6;
            position: sticky;
            top: 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #4A7A4A;
        }
    </style>
</head>
<body>
<header>
    <div class="container">
        <h1>Herb miRNA Data</h1>
    </div>
</header>


<main class="container">
    <div class="table-box" style="text-align:center">
        <h2>miRNA Data Show</h2>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>
                            Accession
                            <select class="filter-select" data-column="0">
                                <option value="">All Accession</option>
                            </select>
                        </th>
                        <th>
                            ID
                            <select class="filter-select" data-column="1">
                                <option value="">All ID</option>
                            </select>
                        </th>
                        <th>
                            Family
                            <select class="filter-select" data-column="2">
                                <option value="">All Family</option>
                            </select>
                        </th>
                        <th>
                            Species Latin
                            <select class="filter-select" data-column="3">
                                <option value="">All Latin Name</option>
                            </select>
                        </th>
                        <th>
                            Sequence
                            <select class="filter-select" data-column="4">
                                <option value="">All Sequence</option>
                            </select>
                        </th>
                        <th>
                            Species
                            <select class="filter-select" data-column="5">
                                <option value="">All Herb Name</option>
                            </select>
                        </th>
                    </tr>
                </thead>
                <tbody id="miRNATableBody">
                </tbody>
            </table>
        </div>
        <div style="margin-top: 10px; font-size: 14px;" id="recordCount"> Records</div>
    </div>
</main>

<footer style="text-align: center; padding: 10px; background-color: #eee; margin-top: 20px;">
    <p>&copy; 2026 梦翔课题组</p>
</footer>

<script>

    let miRNAData = []; 
    let isLoaded = false;
    const tbody = document.getElementById('miRNATableBody');
    const loadStatus = document.getElementById('loadStatus');
    const recordCount = document.getElementById('recordCount');
    let filterSelects = document.querySelectorAll('.filter-select');


    function normalizeData(obj) {
        const accession = obj.Accession || '-';
        const id = obj.ID || '-';
        const family = obj.Family || '-';
        const speciesLatin = obj['Species Latin'] || obj.SpeciesLatin || obj.latin_name || '-';
        const sequence = obj.Sequence || '-';
        const species = obj.Species || '-';
        return [accession, id, family, speciesLatin, sequence, species];
    }


    function fillFilterSelects() {
        if (!isLoaded) return;
        const columnVals = [[], [], [], [], [], []];
        miRNAData.forEach(row => {
            row.forEach((val, idx) => {
                if (val !== '-' && !columnVals[idx].includes(val)) {
                    columnVals[idx].push(val);
                }
            });
        });
        filterSelects.forEach(select => {
            const col = parseInt(select.dataset.column);
            columnVals[col].forEach(val => {
                const option = document.createElement('option');
                option.value = val;
                option.textContent = val;
                select.appendChild(option);
            });
        });
    }

    function renderTable() {
        if (!isLoaded) return;
        const filters = [];
        filterSelects.forEach(select => {
            filters[parseInt(select.dataset.column)] = select.value.trim();
        });
        const filteredData = miRNAData.filter(row => {
            for (let i = 0; i < 6; i++) {
                if (filters[i] && row[i] !== filters[i]) {
                    return false;
                }
            }
            return true;
        });
        recordCount.textContent = `${filteredData.length} Records (Total ${miRNAData.length} records)`;
        let html = '';
        filteredData.forEach(row => {
            html += `<tr>
                <td>${row[0]}</td>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td>${row[3]}</td>
                <td>${row[4]}</td>
                <td>${row[5]}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    async function loadJSON() {
        const res = await fetch('./web_database_files/miRNA_atlas_results.json');
        const rawData = await res.json();
        miRNAData = rawData.map(item => {
            if (Array.isArray(item)) {
                while (item.length < 6) item.push('-');
                return item.slice(0,6);
            } else {
                return normalizeData(item);
            }
        });
        isLoaded = true;
        fillFilterSelects();
        renderTable();
    }

    filterSelects.forEach(select => {
        select.addEventListener('change', renderTable);
    });

    window.onload = loadJSON;
</script>
</body>
</html>
