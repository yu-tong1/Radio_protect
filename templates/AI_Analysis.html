<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Analysis - RadioProtect TCM</title>
    <link href="./web_database_files/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 90%;
        margin: 0 auto;
        max-width: 1200px;
    }
    header {
        background-color: #4A7A4A;
        color: white;
        padding: 15px 0;
        text-align: center;
    }
    .table-box {
        background-color: white;
        padding: 20px;
        margin: 20px 0;
        border: 1px solid #ddd;
    }
    .filter-input,
    .filter-select {
        width: 100%;
        padding: 5px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .mode-tab {
        padding: 8px 15px;
        cursor: pointer;
        border-bottom: 2px solid transparent;
    }
    .mode-tab.active {
        border-bottom-color: #4A7A4A;
        font-weight: bold;
    }
    .mode-content {
        display: none;
    }
    .mode-content.active {
        display: block;
    }
    .analysis-result {
        margin-top: 20px;
        padding: 15px;
        background-color: #f9f9f9;
        border: 1px solid #ddd;
    }
    textarea {
        width: 100%;
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: Arial, sans-serif;
    }
    button {
        background-color: #4A7A4A;
        color: white;
        padding: 8px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    button:hover {
        background-color: #3d663d;
    }
    .loading-overlay {
        text-align: center;
        padding: 20px;
        color: #4A7A4A;
    }
    .error-message {
        color: #d9534f;
        padding: 10px;
    }
	
	.bg-white\/90, .bg-white\/80 {
            background-color: white;
            border: 1px solid #ddd;
    }
        
        footer {
            background-color: #4A7A4A;
            color: white;
            text-align: center;
            margin-top: 20px;
        }
        
        footer .border-t {
            border-top: 1px solid #ddd;
        }
        
        footer .text-gray-400 {
            color: white;
        }

    .text-primary { color: black !important; }
    .bg-primary { background: #333 !important; }
	
	#compound-result-content{
		white-space: pre-wrap;
		font-family: inherit;
		line-height: 1.5;
		background-color: azure;
		padding: 20px;
		border-radius: 10px;
	}
    </style>
</head>
<body class="bg-light font-sans text-dark antialiased">

<header>
    <div class="container">
        <h1>RadioProtect TCM · AI Analysis</h1>
    </div>
</header>

<main class="container mx-auto px-4 py-12 max-w-6xl">
    <section class="mb-12">
        <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-6 md:p-8 border border-accent">
            <div class="mode-content active" id="compound-analysis">
                <div class="mb-6">
                    <h4 class="text-lg font-semibold mb-4 text-primary">Compound Screening Analysis</h4>

                    <div class="flex border-b border-gray-200 mb-6">
                        <div class="mode-tab active px-4 py-2 font-medium rounded-t-lg" data-submode="normal">
                            Normal Mode
                        </div>
						<div class="mode-tab px-4 py-2 font-medium rounded-t-lg" data-submode="cancer">
                            Cancer Mode
                        </div>
                    </div>
					
					<!-- Radiation Type -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Radiation Type</label>
                            <select id="radiation-type" class="filter-select">
                                <option value="X-rays">X-rays</option>
                                <option value="γ-rays">γ-rays</option>
                                <option value="protons">protons</option>
                            </select>
                        </div>
                    </div>
					
					<!-- View Files -->
                    <div class="bg-light p-4 rounded-lg border border-accent mb-6">
                        <h5 class="text-sm font-semibold mb-3 text-primary">Files</h5>
						<select id="fileList" multiple size="4" style="width:100%; margin:5px 0;"></select>
						<button id="manageFilesBtn" class="bg-primary text-white px-3 py-1 rounded">Delete Selected</button>
					</div>
					
                    <!-- API Configuration -->
                    <div class="bg-light p-4 rounded-lg border border-accent mb-6">
                        <h5 class="text-sm font-semibold mb-3 text-primary">API Configuration</h5>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium mb-1">API Key</label>
                                <input type="password" id="api-key" class="filter-input" placeholder="Enter your API key" value="">
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1">API Base URL</label>
                                <input type="text" id="api-base" class="filter-input" value="https://api.deepseek.com">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="block text-xs font-medium mb-1">AI Model</label>
                            <select id="ai-model" class="filter-select">
                                <optgroup label="GPT">
                                    <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
                                    <option value="gpt-4">gpt-4</option>
                                    <option value="gpt-4-turbo">gpt-4-turbo</option>
                                    <option value="gpt-4o">gpt-4o</option>
                                    <option value="gpt-4o-mini">gpt-4o-mini</option>
                                </optgroup>
                                <optgroup label="DeepSeek">
                                    <option value="deepseek-chat">deepseek-chat</option>
                                    <option value="deepseek-reasoner">deepseek-reasoner</option>
                                </optgroup>
                                <optgroup label="元宝">
                                    <option value="yuanbao-13b-chat">yuanbao-13b-chat</option>
                                    <option value="yuanbao-70b-chat">yuanbao-70b-chat</option>
                                </optgroup>
                                <optgroup label="讯飞星火">
                                    <option value="spark-1.5">spark-1.5</option>
                                    <option value="spark-2.0">spark-2.0</option>
                                    <option value="spark-3.0">spark-3.0</option>
                                    <option value="spark-4.0">spark-4.0</option>
                                </optgroup>
                                <optgroup label="文心一言">
                                    <option value="ernie-3.5">ernie-3.5</option>
                                    <option value="ernie-4.0">ernie-4.0</option>
                                    <option value="ernie-turbo">ernie-turbo</option>
                                </optgroup>
                                <optgroup label="豆包">
                                    <option value="doubao-pro">doubao-pro</option>
                                    <option value="doubao-lite">doubao-lite</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Prompt Configuration -->
                    <div class="bg-light p-4 rounded-lg border border-accent mb-6">
                        <h5 class="text-sm font-semibold mb-3 text-primary">Prompt Configuration</h5>
                        <div>
                            <label class="block text-xs font-medium mb-1">System Prompt</label>
                            <textarea id="system-prompt" class="filter-input" rows="8" placeholder="Enter system prompt here">你是一位专业的辐射防护和中药成分分析专家。请根据提供的化合物筛选结果，
进行专业的分析和解读。请从以下几个方面分析：
1. 化合物的种类富集情况（皂苷、萜类、生物碱、多糖、氨基酸及其衍生物、黄酮、脂类、核酸等）
2. 主要基因和通路的富集情况
3. 化合物的药物相似性和口服生物利用度
4. 针对特定辐射类型的防护机制（对于癌症文件，请重点分析放疗协同机制）
5. 潜在的辐射防护靶点和机制（对于癌症文件，请重点分析放疗增敏或协同作用靶点）
6. 对不同中药的抗辐射潜力进行评估和比较（对于癌症文件，请评估放疗协同潜力）
7. 给出实验或应用建议

请用中文回答，语言要专业但易懂，结构清晰。</textarea>
                        </div>
                    </div>
                    
                    <button id="analyze-compound" class="bg-primary text-white px-6 py-2 rounded-lg hover:bg-secondary transition-colors flex items-center">
                        Run AI Analysis
                    </button>
                </div>
                <div id="compound-result" class="analysis-result" style="display: none;">
                    <h5 class="font-semibold mb-2">AI Analysis Result</h5>
                    <div id="compound-result-content"></div>
                </div>
            </div>


        </div>
    </section>
</main>

<footer class="bg-dark text-white py-8">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-4 md:mb-0">
                    <div class="flex items-center gap-2">
                        <h3 class="foottext">RadioProtect TCM · Screening platform</h3>
            </div>
            <div>
                &copy; 2026 梦翔课题组.
            </div>
        </div>
</footer>

<script>
    document.querySelectorAll('.mode-tab[data-submode]').forEach(tab => {
        tab.addEventListener('click', function() {
            const submode = this.getAttribute('data-submode');
            
            document.querySelectorAll('.mode-tab[data-submode]').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            
            const radiationTypeSelect = document.getElementById('radiation-type');
            radiationTypeSelect.innerHTML = '';
            
            if (submode === 'normal') {
                const normalOptions = ['X-rays', 'γ-rays', 'α-particles', 'Heavy Metal'];
                normalOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option;
                    opt.textContent = option;
                    radiationTypeSelect.appendChild(opt);
                });
            } else if (submode === 'cancer') {
				const cancerOptions = ['X-rays', 'γ-rays', 'protons'];
                cancerOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option;
                    opt.textContent = option;
                    radiationTypeSelect.appendChild(opt);
                });
            }
        });
    });
	
    document.getElementById('analyze-compound').addEventListener('click', function() {
        const radiationType = document.getElementById('radiation-type').value;
        const apiKey = document.getElementById('api-key').value;
        const apiBase = document.getElementById('api-base').value;
        const systemPrompt = document.getElementById('system-prompt').value;
        const model = document.getElementById('ai-model').value;

        const selectedSubmode = document.querySelector('.mode-tab[data-submode].active').getAttribute('data-submode');
        const resultDiv = document.getElementById('compound-result');
        const resultContent = document.getElementById('compound-result-content');
        

        resultContent.innerHTML = '<div class="loading-overlay"><i class="fas fa-spinner fa-spin"></i> Analyzing...</div>';
        resultDiv.style.display = 'block';

        fetch('/api/analyze-compound', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
                radiation_type: radiationType,
                mode: selectedSubmode, 
                api_key: apiKey,
                api_base: apiBase,
                system_prompt: systemPrompt,
                model: model
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                resultContent.innerHTML = data.result;
            } else {
                resultContent.innerHTML = '<div class="error-message">' + data.error + '</div>';
            }
        })
        .catch(error => {
            resultContent.innerHTML = '<div class="error-message">Error: ' + error.message + '</div>';
        });
    });
</script>

<script>
	const fileSelect = document.getElementById('fileList');
	const manageBtn = document.getElementById('manageFilesBtn');
	function refreshFileList() {
		fetch('/api/file')
			.then(r => r.json())
			.then(data => {
				if (data.files && Array.isArray(data.files)) {
                    fileSelect.innerHTML = data.files.map(f => `<option value="${f}">${f}</option>`).join('');
                } else {
                    fileSelect.innerHTML = '';
                }
            })
            .catch(err => console.error('刷新文件列表失败:', err));
    }
	if (manageBtn){
		manageBtn.onclick = () => {
		const selected = Array.from(fileSelect.selectedOptions).map(opt => opt.value);
		if (selected.length === 0) {
			refreshFileList();
			return;
		}
		if (!confirm(`Delete ${selected.length} file(s)?`)) return;
		fetch('/api/file', {
			method: 'DELETE',
			headers: {'Content-Type': 'application/json'},
			body: JSON.stringify({files: selected})
		})
			.then(r => r.json())
			.then(data => {
			if (data.deleted && data.deleted.length > 0) {
            alert(`Deleted: ${data.deleted.join(', ')}`);
			}
			if (data.errors && data.errors.length > 0) {
				alert(`Errors: ${data.errors.join(', ')}`);
			}
			if ((!data.deleted || data.deleted.length === 0) && (!data.errors || data.errors.length === 0)) {
				alert('No file was deleted.');
			}
			refreshFileList();
		})
		.catch(e => alert(e));
		};

	}
	
	refreshFileList();
</script>

</body>
</html>
